<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Outer hexagon outline (tech/science feel) -->
  <polygon points="32,4 56,18 56,46 32,60 8,46 8,18" stroke="currentColor" stroke-width="3" stroke-linejoin="round" />
  
  <!-- "vibe" waveform -->
  <path d="M 16,32 Q 22,18 28,32 T 40,32 T 48,32" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- "<>" code brackets -->
  <polyline points="24,24 16,32 24,40" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
  <polyline points="40,24 48,32 40,40" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- central pulse/monitor dot -->
  <circle cx="32" cy="32" r="3" fill="currentColor" />
</svg>
